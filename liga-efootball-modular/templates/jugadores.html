<!DOCTYPE html>
<html>
<head>
    <title>Jugadores</title>
</head>
<body>
    <h1>Jugadores</h1>

    <ul>
        {% for jugador in jugadores %}
            <li>
                {{ jugador.nombre }} - {{ jugador.equipo }} - {{ jugador.posicion }} - Media: {{ jugador.media }}
            </li>
        {% endfor %}
    </ul>

    <a href="/">Volver al inicio</a>
</body>
</html>
