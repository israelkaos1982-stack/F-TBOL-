<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plantilla Real Madrid CF</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #0a0c10;
    --card: #111520;
    --card2: #161b28;
    --border: #ffffff10;
    --white: #e8eaf0;
    --muted: #5a6070;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, #c9a84c18, transparent),
      radial-gradient(ellipse 40% 40% at 90% 80%, #1a2a5020, transparent);
    pointer-events: none;
    z-index: 0;
  }
  .page { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 16px 60px; }
  header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 36px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    animation: fadeDown 0.5s ease;
  }
  .escudo {
    width: 72px;
    height: 72px;
    object-fit: contain;
    filter: drop-shadow(0 0 18px #c9a84c66);
  }
  .header-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 3px;
    color: var(--gold-light);
    line-height: 1;
    text-shadow: 0 0 30px #c9a84c55;
  }
  .header-text p {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .filter-btn:hover, .filter-btn.active {
    background: #c9a84c22;
    border-color: var(--gold);
    color: var(--gold-light);
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--gold);
    padding: 10px 0 6px;
    border-bottom: 1px solid #c9a84c33;
    margin-bottom: 10px;
    margin-top: 24px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.2s;
    animation: fadeUp 0.4s ease both;
    cursor: default;
  }
  .card:hover {
    background: var(--card2);
    border-color: #c9a84c44;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px #00000044;
  }
  .dorsal {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: #c9a84c33;
    min-width: 36px;
    text-align: center;
    line-height: 1;
  }
  .foto {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    object-position: top;
    border: 2px solid #c9a84c44;
    background: #1a2030;
    flex-shrink: 0;
  }
  .foto-placeholder {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid #c9a84c22;
    background: #1a2030;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: #c9a84c55;
  }
  .info { flex: 1; min-width: 0; }
  .nombre {
    font-weight: 700;
    font-size: 14px;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
  .pos-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; }
  .pos-POR { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44; }
  .pos-DEF { background: #3b82f622; color: #60a5fa; border: 1px solid #3b82f644; }
  .pos-MED { background: #10b98122; color: #34d399; border: 1px solid #10b98144; }
  .pos-DEL { background: #ef444422; color: #f87171; border: 1px solid #ef444444; }
  .nac { font-size: 11px; color: var(--muted); }
  .rating {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    min-width: 36px;
    text-align: center;
    border-radius: 8px;
    padding: 4px 6px;
    line-height: 1;
  }
  .r-gold  { color: #ffd700; background: #ffd70015; border: 1px solid #ffd70033; }
  .r-green { color: #4ade80; background: #4ade8015; border: 1px solid #4ade8033; }
  .r-blue  { color: #60a5fa; background: #60a5fa15; border: 1px solid #60a5fa33; }
  .r-gray  { color: #94a3b8; background: #94a3b815; border: 1px solid #94a3b833; }
  .status { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
  .status-lesion { background: #ef444422; color: #f87171; border: 1px solid #ef444444; }
  .status-tarjeta { background: #f59e0b22; color: #fbbf24; border: 1px solid #f59e0b44; }
  .stat-row { display: flex; gap: 14px; margin-top: 28px; flex-wrap: wrap; }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    flex: 1;
    min-width: 120px;
    text-align: center;
  }
  .stat-box .val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--gold-light); }
  .stat-box .lbl { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
  .back-link { display: inline-block; margin-top: 24px; color: var(--muted); font-size: 12px; text-decoration: none; letter-spacing: 1px; }
  .back-link:hover { color: var(--gold); }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="page">

  <a class="back-link" href="/">← Volver al inicio</a>

  <header>
    <img class="escudo"
         src="https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg"
         alt="Real Madrid">
    <div class="header-text">
      <h1>Real Madrid CF</h1>
      <p>Plantilla · Primera División · 2025–26</p>
    </div>
  </header>

  <div class="stat-row">
    <div class="stat-box"><div class="val" id="totalJug">35</div><div class="lbl">Jugadores</div></div>
    <div class="stat-box"><div class="val">93</div><div class="lbl">Top Rating</div></div>
    <div class="stat-box"><div class="val" id="mediaVal">—</div><div class="lbl">Media</div></div>
    <div class="stat-box"><div class="val">25</div><div class="lbl">Edad Media</div></div>
  </div>

  <div class="filters" style="margin-top:24px;">
    <button class="filter-btn active" onclick="filtrar('TODOS',this)">Todos</button>
    <button class="filter-btn" onclick="filtrar('POR',this)">Porteros</button>
    <button class="filter-btn" onclick="filtrar('DEF',this)">Defensas</button>
    <button class="filter-btn" onclick="filtrar('MED',this)">Centrocampistas</button>
    <button class="filter-btn" onclick="filtrar('DEL',this)">Delanteros</button>
  </div>

  <div id="contenido"></div>
</div>

<script>
const fotos = {
  "Thibaut Courtois":  "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Courtois_2018_WC.jpg/320px-Courtois_2018_WC.jpg",
  "Andriy Lunin":      "https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Andriy_Lunin_2019.jpg/320px-Andriy_Lunin_2019.jpg",
  "Alexander-Arnold":  "https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Trent_Alexander-Arnold_2018.jpg/320px-Trent_Alexander-Arnold_2018.jpg",
  "A. Rüdiger":        "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Antonio_R%C3%BCdiger_2017.jpg/320px-Antonio_R%C3%BCdiger_2017.jpg",
  "Éder Militão":      "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Eder_Militao_2019.jpg/320px-Eder_Militao_2019.jpg",
  "Dani Carvajal":     "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Carvajal_2018_WC.jpg/320px-Carvajal_2018_WC.jpg",
  "Dean Huijsen":      "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Dean_Huijsen_2024.jpg/320px-Dean_Huijsen_2024.jpg",
  "David Alaba":       "https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/David_Alaba_2021.jpg/320px-David_Alaba_2021.jpg",
  "Ferland Mendy":     "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Ferland_Mendy_2019.jpg/320px-Ferland_Mendy_2019.jpg",
  "J. Bellingham":     "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Jude_Bellingham_2022_%28cropped%29.jpg/320px-Jude_Bellingham_2022_%28cropped%29.jpg",
  "F. Valverde":       "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Federico_Valverde_2022_%28cropped%29.jpg/320px-Federico_Valverde_2022_%28cropped%29.jpg",
  "Arda Güler":        "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Arda_G%C3%BCler_2022.jpg/320px-Arda_G%C3%BCler_2022.jpg",
  "A. Tchouaméni":     "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Tchouam%C3%A9ni_2022.jpg/320px-Tchouam%C3%A9ni_2022.jpg",
  "E. Camavinga":      "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Eduardo_Camavinga_2021.jpg/320px-Eduardo_Camavinga_2021.jpg",
  "Brahim Díaz":       "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Brahim_D%C3%ADaz_2019.jpg/320px-Brahim_D%C3%ADaz_2019.jpg",
  "Dani Ceballos":     "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Dani_Ceballos_2021.jpg/320px-Dani_Ceballos_2021.jpg",
  "K. Mbappé":         "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Kylian_Mbapp%C3%A9_2019.jpg/320px-Kylian_Mbapp%C3%A9_2019.jpg",
  "Vinícius Jr.":      "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Vinicius_Junior_2023_%28cropped%29.jpg/320px-Vinicius_Junior_2023_%28cropped%29.jpg",
  "Rodrygo":           "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Rodrygo_2022.jpg/320px-Rodrygo_2022.jpg",
  "F. Mastantuono":    "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Franco_Mastantuono_2024.jpg/320px-Franco_Mastantuono_2024.jpg",
};

const jugadores = [
  { num:1,  nombre:"Thibaut Courtois",  pos:"POR", nac:"BEL", rating:91, status:null },
  { num:13, nombre:"Andriy Lunin",       pos:"POR", nac:"UKR", rating:77, status:null },
  { num:26, nombre:"Fran González",      pos:"POR", nac:"ESP", rating:68, status:null },
  { num:43, nombre:"Sergio Mestre",      pos:"POR", nac:"ESP", rating:62, status:null },
  { num:12, nombre:"Alexander-Arnold",   pos:"DEF", nac:"ENG", rating:83, status:null },
  { num:22, nombre:"A. Rüdiger",         pos:"DEF", nac:"GER", rating:83, status:null },
  { num:3,  nombre:"Éder Militão",       pos:"DEF", nac:"BRA", rating:82, status:"lesion" },
  { num:2,  nombre:"Dani Carvajal",      pos:"DEF", nac:"ESP", rating:81, status:null },
  { num:18, nombre:"Á. Carreras",        pos:"DEF", nac:"ESP", rating:80, status:"tarjeta" },
  { num:24, nombre:"Dean Huijsen",       pos:"DEF", nac:"ESP", rating:79, status:null },
  { num:17, nombre:"Raúl Asencio",       pos:"DEF", nac:"ESP", rating:78, status:null },
  { num:4,  nombre:"David Alaba",        pos:"DEF", nac:"AUT", rating:78, status:"lesion" },
  { num:23, nombre:"Ferland Mendy",      pos:"DEF", nac:"FRA", rating:75, status:null },
  { num:20, nombre:"Fran García",        pos:"DEF", nac:"ESP", rating:74, status:null },
  { num:35, nombre:"David Jiménez",      pos:"DEF", nac:"ESP", rating:65, status:null },
  { num:48, nombre:"L. Fati",            pos:"DEF", nac:"ESP", rating:64, status:null },
  { num:40, nombre:"V. Valdepeñas",      pos:"DEF", nac:"ESP", rating:64, status:null },
  { num:27, nombre:"Diego Aguado",       pos:"DEF", nac:"ESP", rating:63, status:null },
  { num:36, nombre:"Joan Martínez",      pos:"DEF", nac:"ESP", rating:63, status:null },
  { num:5,  nombre:"J. Bellingham",      pos:"MED", nac:"ENG", rating:89, status:"lesion" },
  { num:8,  nombre:"F. Valverde",        pos:"MED", nac:"URU", rating:88, status:"lesion" },
  { num:15, nombre:"Arda Güler",         pos:"MED", nac:"TUR", rating:87, status:null },
  { num:14, nombre:"A. Tchouaméni",      pos:"MED", nac:"FRA", rating:82, status:null },
  { num:6,  nombre:"E. Camavinga",       pos:"MED", nac:"FRA", rating:82, status:null },
  { num:21, nombre:"Brahim Díaz",        pos:"MED", nac:"MAR", rating:76, status:null },
  { num:19, nombre:"Dani Ceballos",      pos:"MED", nac:"ESP", rating:75, status:"lesion" },
  { num:45, nombre:"T. Pitarch",         pos:"MED", nac:"ESP", rating:68, status:null },
  { num:28, nombre:"Jorge Cestero",      pos:"MED", nac:"ESP", rating:67, status:null },
  { num:37, nombre:"Manuel Ángel",       pos:"MED", nac:"ESP", rating:67, status:null },
  { num:38, nombre:"César Palacios",     pos:"MED", nac:"ESP", rating:66, status:null },
  { num:10, nombre:"K. Mbappé",          pos:"DEL", nac:"FRA", rating:93, status:null },
  { num:7,  nombre:"Vinícius Jr.",       pos:"DEL", nac:"BRA", rating:91, status:null },
  { num:11, nombre:"Rodrygo",            pos:"DEL", nac:"BRA", rating:78, status:null },
  { num:16, nombre:"Gonzalo García",     pos:"DEL", nac:"ESP", rating:75, status:null },
  { num:30, nombre:"F. Mastantuono",     pos:"DEL", nac:"ARG", rating:74, status:"tarjeta" },
];

const posLabel = { POR:"Porteros", DEF:"Defensas", MED:"Centrocampistas", DEL:"Delanteros" };

function ratingClass(r) {
  if (r >= 90) return 'r-gold';
  if (r >= 80) return 'r-green';
  if (r >= 70) return 'r-blue';
  return 'r-gray';
}

function getIniciales(n) {
  return n.split(' ').map(p=>p[0]).join('').substring(0,2).toUpperCase();
}

function filtrar(pos, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderizar(pos);
}

function renderizar(filtro = 'TODOS') {
  const contenido = document.getElementById('contenido');
  contenido.innerHTML = '';
  const secciones = filtro === 'TODOS' ? ['POR','DEF','MED','DEL'] : [filtro];

  secciones.forEach(pos => {
    const lista = jugadores.filter(j => j.pos === pos);
    if (!lista.length) return;

    const titulo = document.createElement('div');
    titulo.className = 'section-title';
    titulo.textContent = posLabel[pos];
    contenido.appendChild(titulo);

    const grid = document.createElement('div');
    grid.className = 'grid';

    lista.forEach((j, i) => {
      const fotoSrc = fotos[j.nombre];
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (i * 0.04) + 's';

      let statusHtml = '';
      if (j.status === 'lesion') statusHtml = '<span class="status status-lesion">LESIÓN</span>';
      if (j.status === 'tarjeta') statusHtml = '<span class="status status-tarjeta">SANCIÓN</span>';

      const ini = getIniciales(j.nombre);
      const fotoHtml = fotoSrc
        ? `<img class="foto" src="${fotoSrc}" alt="${j.nombre}" onerror="this.outerHTML='<div class=\\'foto-placeholder\\'>${ini}</div>'">`
        : `<div class="foto-placeholder">${ini}</div>`;

      card.innerHTML = `
        <div class="dorsal">${j.num}</div>
        ${fotoHtml}
        <div class="info">
          <div class="nombre">${j.nombre}</div>
          <div class="meta">
            <span class="pos-badge pos-${j.pos}">${j.pos}</span>
            <span class="nac">${j.nac}</span>
            ${statusHtml}
          </div>
        </div>
        <div class="rating ${ratingClass(j.rating)}">${j.rating}</div>
      `;
      grid.appendChild(card);
    });
    contenido.appendChild(grid);
  });

  const filtrados = filtro === 'TODOS' ? jugadores : jugadores.filter(j => j.pos === filtro);
  const media = Math.round(filtrados.reduce((s,j) => s + j.rating, 0) / filtrados.length);
  document.getElementById('mediaVal').textContent = media;
  document.getElementById('totalJug').textContent = filtrados.length;
}

renderizar();
</script>
</body>
</html>
