<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Paris Saint-Germain crest</title>
  <desc id="desc">Paris Saint-Germain styled circular crest with blue ring, red Eiffel tower and gold cradle emblem.</desc>

  <!-- Outer rings -->
  <circle cx="256" cy="256" r="248" fill="#0b1d48"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#ffffff" stroke-width="8"/>
  <circle cx="256" cy="256" r="198" fill="none" stroke="#cf102d" stroke-width="32"/>
  <circle cx="256" cy="256" r="150" fill="#0b1d48" stroke="#ffffff" stroke-width="8"/>

  <!-- Wordmark ring -->
  <text x="256" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="6">PARIS</text>
  <text x="256" y="454" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="4">SAINT-GERMAIN</text>

  <!-- Eiffel tower (closer to official silhouette) -->
  <path fill="#cf102d" d="M256 108L312 270H284L302 334H210L228 270H200L256 108z"/>
  <path fill="#ffffff" opacity="0.95" d="M256 164L287 260H225L256 164z"/>
  <rect x="242" y="258" width="28" height="20" fill="#cf102d"/>

  <!-- Cradle + fleur-de-lis -->
  <ellipse cx="256" cy="344" rx="52" ry="42" fill="#f2c94c"/>
  <path fill="#0b1d48" d="M256 320c11 0 20 9 20 20 0 12-8 22-20 31-12-9-20-19-20-31 0-11 9-20 20-20z"/>
  <path fill="#f2c94c" d="M256 324l7 13 14 2-10 10 2 14-13-7-13 7 2-14-10-10 14-2z"/>

  <!-- Decorative inner ring -->
  <circle cx="256" cy="256" r="142" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.65"/>
</svg>
