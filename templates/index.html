<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Liga eFootball | Barajas de Poder</title>
    <style>
        :root { --bg: #0f0f1a; --card: #1a1a2e; --accent: #ff0055; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Cabecera Estilo Twitch/eSports */
        .match-setup { 
            background: var(--card); border-radius: 15px; padding: 25px; 
            display: flex; justify-content: space-around; align-items: center;
            border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .team-select { text-align: center; width: 35%; }
        .team-select select { 
            width: 100%; padding: 12px; background: #252545; color: white; 
            border: 1px solid #444; border-radius: 8px; font-weight: bold;
        }

        .vs-badge { font-style: italic; font-weight: 900; color: #555; font-size: 1.5rem; }

        /* Marcador Principal */
        .live-score { 
            text-align: center; margin: 30px 0; background: linear-gradient(180deg, #111, #000);
            padding: 30px; border-radius: 20px; border: 2px solid #222;
        }
        #ml-timer-j1m1 { font-family: monospace; font-size: 2rem; color: #ffcc00; margin-bottom: 10px; }
        .score-nums { font-size: 5rem; font-weight: 900; display: flex; justify-content: center; gap: 40px; }

        /* Botón de Simulación */
        .btn-simular { 
            display: block; width: 100%; max-width: 300px; margin: 20px auto;
            padding: 15px; background: #00ff88; color: #000; border: none; 
            border-radius: 50px; font-weight: 900; text-transform: uppercase;
            cursor: pointer; transition: 0.3s;
        }
        .btn-simular:hover { transform: scale(1.05); background: #00cc6e; }

        /* Acta del Partido */
        .acta { background: #050505; border-radius: 15px; padding: 20px; border: 1px solid #333; min-height: 300px; }
        .acta h3 { border-bottom: 2px solid #222; padding-bottom: 10px; color: #666; font-size: 0.9rem; text-transform: uppercase; }
        
        .evento { 
            display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #111;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Colores de las Cartas de Posición (Reglamento) */
        .badge-pos { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-right: 15px; }
        .POR { background: #ffcc00; color: black; }
        .DEF { background: #00ccff; color: black; }
        .MED { background: #cc33ff; color: white; }
        .DEL { background: #ff3333; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="match-setup">
        <div class="team-select">
            <h4 id="name-L">LOCAL</h4>
            <select id="select-local" onchange="actualizarColores()"></select>
        </div>
        <div class="vs-badge">VS</div>
        <div class="team-select">
            <h4 id="name-V">VISITANTE</h4>
            <select id="select-visitante" onchange="actualizarColores()"></select>
        </div>
    </div>

    <div class="live-score">
        <div id="ml-timer-j1m1">00:00</div>
        <div class="score-nums">
            <span id="goles-L">0</span>
            <span id="goles-V">0</span>
        </div>
    </div>

    <button class="btn-simular" onclick="comenzarPartido()">⚽ SIMULAR PODER</button>

    <div class="acta">
        <h3>■ ACTA DEL PARTIDO</h3>
        <div id="ml-acta-list-j1m1"></div>
    </div>
</div>

<script src="static/js/data-teams.js"></script>
<script src="static/js/jugadores-data.js"></script>
<script src="static/js/index.bundle.js"></script>
<script src="static/js/match-engine.js"></script>

<script>
    // 1. Cargamos tus datos de "data-teams.js" en los selectores
    const EQUIPOS_DATA = {
        "FC Barcelona": { media: 85, color: "#004d98" },
        "Real Madrid": { media: 85, color: "#ffffff" },
        "Atletico Madrid": { media: 83, color: "#cb3524" },
        "Athletic Club": { media: 79, color: "#ff0000" },
        "Villarreal": { media: 80, color: "#ffe200" },
        "Betis": { media: 79, color: "#0bb363" },
        "Osasuna": { media: 77, color: "#9e0b1c" },
        "Real Sociedad": { media: 79, color: "#0067b1" },
        "Girona": { media: 77, color: "#e2001a" },
        "Rayo Vallecano": { media: 77, color: "#ffffff" },
        "Espanyol": { media: 76, color: "#0088ce" },
        "Celta": { media: 76, color: "#87adcf" },
        "Mallorca": { media: 76, color: "#e30613" },
        "Valencia": { media: 76, color: "#ffffff" },
        "Sevilla": { media: 75, color: "#ffffff" },
        "Getafe": { media: 75, color: "#00539b" },
        "Deportivo Alavés": { media: 74, color: "#005ca9" },
        "Elche": { media: 74, color: "#ffffff" },
        "Real Oviedo": { media: 73, color: "#004a99" },
        "Levante": { media: 72, color: "#004d98" }
    };

    function poblarSelects() {
        const selL = document.getElementById('select-local');
        const selV = document.getElementById('select-visitante');
        Object.keys(EQUIPOS_DATA).forEach(eq => {
            selL.add(new Option(`${eq} (${EQUIPOS_DATA[eq].media})`, eq));
            selV.add(new Option(`${eq} (${EQUIPOS_DATA[eq].media})`, eq));
        });
        selV.selectedIndex = 1;
        actualizarColores();
    }

    function actualizarColores() {
        const l = document.getElementById('select-local').value;
        const v = document.getElementById('select-visitante').value;
        document.getElementById('name-L').style.color = EQUIPOS_DATA[l].color;
        document.getElementById('name-V').style.color = EQUIPOS_DATA[v].color;
    }

    let loop = null;

    function comenzarPartido() {
        if(loop) clearInterval(loop);
        const l = document.getElementById('select-local').value;
        const v = document.getElementById('select-visitante').value;
        
        // El motor ahora usa tus medias EXACTAS del código
        const partido = new MatchEngine(l, v, EQUIPOS_DATA[l].media, EQUIPOS_DATA[v].media);
        
        document.getElementById('ml-acta-list-j1m1').innerHTML = '';
        
        loop = setInterval(() => {
            const ev = partido.simularMinuto();
            document.getElementById('ml-timer-j1m1').innerText = (partido.minuto < 10 ? '0' : '') + partido.minuto + ":00";
            
            if(ev) {
                document.getElementById('goles-L').innerText = partido.golesL;
                document.getElementById('goles-V').innerText = partido.golesV;
                
                // Pintamos el evento con su Carta de Poder
                const acta = document.getElementById('ml-acta-list-j1m1');
                const div = document.createElement('div');
                div.className = 'evento';
                // La posición viene del motor (POR, DEF, MED, DEL)
                const pos = ev.pos || "DEL"; 
                div.innerHTML = `<span class="badge-pos ${pos}">${pos}</span> <b>${ev.jugador}</b> metió gol para el ${ev.equipo}`;
                acta.prepend(div);
            }

            if(partido.terminado) {
                clearInterval(loop);
                alert("Partido Finalizado. MVP: " + partido.calcularMVP());
            }
        }, 80);
    }

    poblarSelects();
</script>

</body>
</html>
