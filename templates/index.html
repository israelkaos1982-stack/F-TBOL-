<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eFootball ✓</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/index.bundle.css') }}?v=3.9">
  <style>
    /* ── HOME: todas las cards exactamente 80px, gap 15px ── */
    #s-home .menu-grid{gap:15px!important;}
    #s-home .menu-card,
    #s-home .menu-card.full,
    #s-home #home-live-card,
    #s-home .mc-derbys,
    #s-home .mc-espana,
    #s-home .mc-comp,
    #s-home .mc-ligas,
    #s-home .mc-sel,
    #s-home .equipo-card,
    #s-home .mc-athletic,
    #s-home .mc-betis,
    #s-home .mc-sociedad,
    #s-home .mc-madrid,
    #s-home .mc-barca{
      height:80px!important;
      min-height:80px!important;
      max-height:80px!important;
      overflow:hidden!important;
      position:relative!important;
      box-sizing:border-box!important;
    }
    /* ── ESCUDOS JORNADA: fuerza tamaño 28px ── */
    img.escudo-jornada{width:28px!important;height:28px!important;max-width:28px!important;max-height:28px!important;object-fit:contain!important;flex-shrink:0!important;}
    /* ── SHIELDS MATCH SIMULATOR: max tamaño ── */
    .ml-shield-wrap img{max-width:44px!important;max-height:44px!important;}
    /* ── NAV ROW: Volver + Home agrupados ── */
    .nav-row{display:flex;align-items:center;gap:6px;margin:14px 18px 0;position:sticky;top:0;z-index:150;width:fit-content;}
    .nav-row .back-btn{margin:0!important;position:static!important;top:auto!important;z-index:auto!important;}
    .home-icon-btn{display:flex!important;align-items:center!important;justify-content:center!important;padding:7px 10px;text-decoration:none;font-size:15px;background:transparent;border:1px solid rgba(240,192,64,.22);border-radius:4px;color:rgba(255,255,255,.45);cursor:pointer;transition:all .16s;line-height:1;}
    .home-icon-btn:hover{color:var(--gold,#f0c040);border-color:var(--gold,#f0c040);}
  </style>
  <script>
    window.BACKEND_ESCUDOS = {{ escudos_resueltos | tojson }};
    window.BACKEND_ESCUDOS_ALIASES = {{ escudos_aliases | tojson }};
    window.BACKEND_ESCUDO_DEFAULT = {{ escudo_default | tojson }};
  </script>
</head>
<body>

  {% include 'partials/misc_body_1.html' %}
  {% include 'partials/part2/misc_body_2.html' %}
  <script src="{{ url_for('static', filename='js/index.bundle.js') }}?v=3.9"></script>
  <script src="{{ url_for('static', filename='js/copa-engine.js') }}?v=1.0"></script>
  <script src="{{ url_for('static', filename='js/primera-rfef-data.js') }}?v=1.1"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      /* Agrupa cada back-btn con el icono de inicio */
      document.querySelectorAll('.back-btn').forEach(function(btn){
        if(btn.closest('.nav-row')) return;
        var row = document.createElement('div');
        row.className = 'nav-row';
        btn.parentNode.insertBefore(row, btn);
        row.appendChild(btn);
        var homeBtn = document.createElement('a');
        homeBtn.href = '/';
        homeBtn.className = 'home-icon-btn';
        homeBtn.setAttribute('aria-label', 'Ir al inicio');
        homeBtn.textContent = '🏠';
        row.appendChild(homeBtn);
      });
      /* Nuclear override: fuerza 80px en TODOS los cards del home */
      var sels = [
        '#s-home .menu-card',
        '#s-home .equipo-card',
        '#s-home .mc-athletic',
        '#s-home .mc-betis',
        '#s-home .mc-sociedad',
        '#s-home .mc-madrid',
        '#s-home .mc-barca'
      ];
      var props = ['height','min-height','max-height'];
      sels.forEach(function(s){
        document.querySelectorAll(s).forEach(function(el){
          props.forEach(function(p){ el.style.setProperty(p,'80px','important'); });
          el.style.setProperty('overflow','hidden','important');
          el.style.setProperty('position','relative','important');
          el.style.setProperty('box-sizing','border-box','important');
        });
      });
    });
  </script>
  <script>
    (function(){
      var scoreState = {};
      var audioUnlocked = false;
      var audioCtx = null;

      function unlockAudio(){
        audioUnlocked = true;
        if (audioCtx && audioCtx.state === 'suspended' && typeof audioCtx.resume === 'function') {
          audioCtx.resume();
        }
        document.removeEventListener('click', unlockAudio, true);
        document.removeEventListener('touchstart', unlockAudio, true);
        document.removeEventListener('keydown', unlockAudio, true);
      }

      function playGoalSound(){
        if (window.__mlSoundEnabled === false || !audioUnlocked) return;
        try {
          var Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) return;
          audioCtx = audioCtx || new Ctx();
          var t = audioCtx.currentTime;
          [[0,523,0.14],[0.12,659,0.14],[0.22,784,0.2],[0.32,1047,0.35]].forEach(function(n){
            var o = audioCtx.createOscillator();
            var g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            var tt = t + n[0];
            o.frequency.setValueAtTime(n[1], tt);
            g.gain.setValueAtTime(0.1, tt);
            g.gain.exponentialRampToValueAtTime(0.0001, tt + n[2]);
            o.start(tt);
            o.stop(tt + n[2]);
          });
        } catch(_) {}
      }

      function flashGoal(matchKey){
        var score = document.querySelector('#mlw-' + matchKey + ' .ml-score');
        if (!score) return;
        var old = score.querySelector('.ml-goal-inline');
        if (old && old.parentNode) old.parentNode.removeChild(old);
        score.classList.add('goal-live');
        var badge = document.createElement('span');
        badge.className = 'ml-goal-inline';
        badge.textContent = '¡GOL!';
        score.appendChild(badge);
        setTimeout(function(){
          score.classList.remove('goal-live');
          if (badge.parentNode) badge.parentNode.removeChild(badge);
        }, 3000);
      }

      function parseScoreCell(el){
        var v = parseInt((el.textContent || '').trim(), 10);
        return Number.isFinite(v) ? v : 0;
      }

      function updateStateFor(matchKey, a, b){
        var total = a + b;
        var prev = scoreState[matchKey];
        scoreState[matchKey] = {a:a,b:b,total:total};
        if (!prev) return;
        if (total > prev.total) {
          flashGoal(matchKey);
          playGoalSound();
        }
      }

      function syncMatchFromNode(node){
        if (!node || !node.id) return;
        var m = node.id.match(/^sc-(.+)-(a|b)$/);
        if (!m) return;
        var key = m[1];
        var aEl = document.getElementById('sc-' + key + '-a');
        var bEl = document.getElementById('sc-' + key + '-b');
        if (!aEl || !bEl) return;
        updateStateFor(key, parseScoreCell(aEl), parseScoreCell(bEl));
      }

      function initBaseline(){
        document.querySelectorAll('[id^="sc-"]').forEach(function(el){
          syncMatchFromNode(el);
        });
      }

      function boot(){
        document.addEventListener('click', unlockAudio, true);
        document.addEventListener('touchstart', unlockAudio, true);
        document.addEventListener('keydown', unlockAudio, true);
        initBaseline();
        var obs = new MutationObserver(function(mutations){
          mutations.forEach(function(m){
            if (m.type === 'characterData') {
              var p = m.target && m.target.parentElement;
              syncMatchFromNode(p);
              return;
            }
            if (m.type === 'childList') {
              syncMatchFromNode(m.target);
              m.addedNodes.forEach(function(n){
                if (n.nodeType === 1) {
                  syncMatchFromNode(n);
                  if (n.querySelectorAll) {
                    n.querySelectorAll('[id^="sc-"]').forEach(syncMatchFromNode);
                  }
                }
              });
            }
          });
        });
        obs.observe(document.body, {subtree:true, childList:true, characterData:true});
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot);
      } else {
        boot();
      }
    })();
  </script>
</body>
</html>
