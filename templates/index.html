<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador eFootball 25/26 | Primera y Segunda</title>
    <style>
        :root {
            --bg: #0b0e11;
            --card: #15191c;
            --accent: #00ff88;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--accent); margin: 0; font-size: 1.8rem; }

        .selector-container {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        select {
            background: #2a2e35;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }

        .match-card {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #333;
            text-align: center;
        }

        .reloj {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 20px;
            font-weight: bold;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
        }

        .team-box { width: 40%; }

        .shield {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            background: #000;
            margin: 0 auto 10px;
            transition: all 0.3s;
        }

        .team-name { font-size: 0.9rem; font-weight: bold; height: 40px; }

        .score-number { font-size: 3.5rem; font-weight: 900; }

        .btn-play {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-play:disabled { background: #444; cursor: not-allowed; }

        .event-log {
            margin-top: 20px;
            height: 100px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            text-align: left;
        }

        .gol-tag { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SIMULADOR DE PODER 25/26</h1>
        <p>Selecciona equipos de 1ª o 2ª División</p>
    </div>

    <div class="selector-container">
        <div>
            <label>LOCAL: </label>
            <select id="select-local" onchange="previsualizar()"></select>
        </div>
        <div>
            <label>VISITANTE: </label>
            <select id="select-visitante" onchange="previsualizar()"></select>
        </div>
    </div>

    <div class="match-card">
        <div class="reloj" id="timer">00:00</div>
        
        <div class="scoreboard">
            <div class="team-box">
                <div id="escudo-l" class="shield">--</div>
                <div id="nombre-l" class="team-name">Local</div>
            </div>
            
            <div class="score-number">
                <span id="score-l">0</span>-<span id="score-v">0</span>
            </div>
            
            <div class="team-box">
                <div id="escudo-v" class="shield">--</div>
                <div id="nombre-v" class="team-name">Visitante</div>
            </div>
        </div>

        <button class="btn-play" id="btn-start" onclick="iniciarPartido()">Simular Partido</button>
        
        <div class="event-log" id="log">
            Esperando inicio del encuentro...
        </div>
    </div>

    <script src="static/js/data-teams.js"></script>
    <script src="static/js/match-engine.js"></script>

    <script>
        // Esta función llena los selectores con los 42 equipos del JS
        function cargarSelectores() {
            const loc = document.getElementById('select-local');
            const vis = document.getElementById('select-visitante');
            const equipos = Object.keys(window.TEAM_RATINGS).sort();

            equipos.forEach(nombre => {
                loc.add(new Option(nombre, nombre));
                vis.add(new Option(nombre, nombre));
            });

            // Selección por defecto: Rayo vs Levante (como en tu foto)
            loc.value = "Rayo Vallecano";
            vis.value = "Levante UD";
            previsualizar();
        }

        // Cambia los escudos y colores antes de jugar
        function previsualizar() {
            const nL = document.getElementById('select-local').value;
            const nV = document.getElementById('select-visitante').value;
            const dataL = window.TEAM_RATINGS[nL];
            const dataV = window.TEAM_RATINGS[nV];

            document.getElementById('nombre-l').innerText = nL;
            document.getElementById('nombre-v').innerText = nV;
            
            const escL = document.getElementById('escudo-l');
            const escV = document.getElementById('escudo-v');
            
            escL.innerText = dataL.media;
            escL.style.borderColor = dataL.color;
            
            escV.innerText = dataV.media;
            escV.style.borderColor = dataV.color;

            // Reset marcador
            document.getElementById('score-l').innerText = "0";
            document.getElementById('score-v').innerText = "0";
            document.getElementById('timer').innerText = "00:00";
            document.getElementById('log').innerHTML = "Preparado para simular.";
        }

        let simulacion = null;

        function iniciarPartido() {
            if(simulacion) clearInterval(simulacion);
            
            const nL = document.getElementById('select-local').value;
            const nV = document.getElementById('select-visitante').value;
            const dataL = window.TEAM_RATINGS[nL];
            const dataV = window.TEAM_RATINGS[nV];

            const motor = new MatchEngine(nL, nV, dataL.media, dataV.media);
            const btn = document.getElementById('btn-start');
            const log = document.getElementById('log');
            
            btn.disabled = true;
            btn.innerText = "Simulando...";
            log.innerHTML = "<b>¡Arranca el partido!</b>";

            simulacion = setInterval(() => {
                const evento = motor.simularMinuto();
                
                // Actualizar Reloj
                const min = motor.minuto < 10 ? '0' + motor.minuto : motor.minuto;
                document.getElementById('timer').innerText = min + ":00";

                if(evento) {
                    document.getElementById('score-l').innerText = motor.golesL;
                    document.getElementById('score-v').innerText = motor.golesV;
                    log.innerHTML = `<div><span class="gol-tag">${motor.minuto}' ¡GOL!</span> del ${evento.equipo}</div>` + log.innerHTML;
                }

                if(motor.terminado) {
                    clearInterval(simulacion);
                    btn.disabled = false;
                    btn.innerText = "Simular de nuevo";
                    log.innerHTML = "<b>--- FINAL DEL PARTIDO ---</b><br>" + log.innerHTML;
                }
            }, 60); // Velocidad de simulación
        }

        // Arrancar al cargar la página
        window.onload = cargarSelectores;
    </script>
</body>
</html>
