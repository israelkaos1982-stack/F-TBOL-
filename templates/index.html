<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eFootball ✓</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/index.bundle.css') }}?v=3.9">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/goal-notification-improved.css') }}?v=2.1">
  <style>
    /* ── HOME: todas las cards exactamente 80px, gap 15px ── */
    #s-home .menu-grid{gap:15px!important;}
    #s-home .menu-card,
    #s-home .menu-card.full,
    #s-home #home-live-card,
    #s-home .mc-derbys,
    #s-home .mc-espana,
    #s-home .mc-comp,
    #s-home .mc-ligas,
    #s-home .mc-sel,
    #s-home .equipo-card,
    #s-home .mc-athletic,
    #s-home .mc-betis,
    #s-home .mc-sociedad,
    #s-home .mc-madrid,
    #s-home .mc-barca{
      height:80px!important;
      min-height:80px!important;
      max-height:80px!important;
      overflow:hidden!important;
      position:relative!important;
      box-sizing:border-box!important;
    }
    /* ── ESCUDOS JORNADA: fuerza tamaño 28px ── */
    img.escudo-jornada{width:28px!important;height:28px!important;max-width:28px!important;max-height:28px!important;object-fit:contain!important;flex-shrink:0!important;}
    /* ── SHIELDS MATCH SIMULATOR: max tamaño ── */
    .ml-shield-wrap img{max-width:44px!important;max-height:44px!important;}
    /* ── NAV ROW: Volver + Home agrupados ── */
    .nav-row{display:flex;align-items:center;gap:6px;margin:14px 18px 0;position:sticky;top:0;z-index:150;width:fit-content;}
    .nav-row .back-btn{margin:0!important;position:static!important;top:auto!important;z-index:auto!important;}
    .home-icon-btn{display:flex!important;align-items:center!important;justify-content:center!important;padding:7px 10px;text-decoration:none;font-size:15px;background:transparent;border:1px solid rgba(240,192,64,.22);border-radius:4px;color:rgba(255,255,255,.45);cursor:pointer;transition:all .16s;line-height:1;}
    .home-icon-btn:hover{color:var(--gold,#f0c040);border-color:var(--gold,#f0c040);}
    /* ── BLOQUEO ABSOLUTO overlay central de gol ── */
    #mm-event-flash,#mm-event-flash.show,#mm-event-flash.mm-flash-gol,
    #mm-event-flash.mm-flash-roja,#mm-event-flash.mm-flash-gol.show,
    #mm-event-flash.mm-flash-roja.show{
      display:none!important;visibility:hidden!important;
      opacity:0!important;pointer-events:none!important;
    }
  </style>
  <script>
    window.BACKEND_ESCUDOS = {{ escudos_resueltos | tojson }};
    window.BACKEND_ESCUDOS_ALIASES = {{ escudos_aliases | tojson }};
    window.BACKEND_ESCUDO_DEFAULT = {{ escudo_default | tojson }};
  </script>
</head>
<body>

  {% include 'partials/misc_body_1.html' %}
  {% include 'partials/part2/misc_body_2.html' %}
  <script src="{{ url_for('static', filename='js/goal-notification-improved.js') }}?v=2.0"></script>
  <script src="{{ url_for('static', filename='js/index.bundle.js') }}?v=4.1"></script>
  <script>
  /* ── PARCHE INLINE: bloquea el overlay central de gol ──────────────────
     Corre inmediatamente después del bundle, sin depender de archivos
     externos cacheados. Es la última línea de defensa. */
  (function(){
    /* 1. Ocultar el elemento si ya existe */
    function hideOverlay(){
      var el=document.getElementById('mm-event-flash');
      if(!el)return;
      el.style.setProperty('display','none','important');
      el.style.setProperty('visibility','hidden','important');
      el.style.setProperty('opacity','0','important');
      el.classList.remove('show','mm-flash-gol','mm-flash-roja');
    }

    /* 2. Parchear window.mmShowFlash para goles */
    var _origFlash = window.mmShowFlash;
    window.mmShowFlash = function(type, teamName, playerName){
      if(type === 'gol'){
        /* Delegar al sistema mejorado si está disponible */
        if(window.goalNotificationImproved){
          /* Buscar el partido por nombre de equipo */
          var matches=document.querySelectorAll('[id^="mlw-"]');
          var matchId=null, team='a';
          for(var i=0;i<matches.length;i++){
            var names=matches[i].querySelectorAll('.ml-team-name');
            for(var j=0;j<names.length;j++){
              if(names[j].textContent.includes(teamName)){
                matchId=matches[i].id.replace('mlw-','');
                team=(j===1)?'b':'a';
                break;
              }
            }
            if(matchId)break;
          }
          if(matchId) window.goalNotificationImproved.show(matchId,team,playerName||'');
        }
        hideOverlay();
        return; /* NUNCA mostrar el overlay central */
      }
      /* Para otros tipos (roja) usar el comportamiento original */
      if(_origFlash) _origFlash(type,teamName,playerName);
    };

    /* 3. MutationObserver sobre el elemento para bloquear cualquier
          intento de mostrar el overlay (incluso si viene de código privado) */
    function watchOverlay(){
      var el=document.getElementById('mm-event-flash');
      if(!el||el._blocked)return;
      el._blocked=true;
      hideOverlay();
      new MutationObserver(function(){hideOverlay();})
        .observe(el,{attributes:true,attributeFilter:['class','style']});
    }
    /* Observar body para cuando el elemento se cree dinámicamente */
    new MutationObserver(function(ms){
      ms.forEach(function(m){
        m.addedNodes.forEach(function(n){
          if(n.id==='mm-event-flash'){hideOverlay();watchOverlay();}
        });
      });
      watchOverlay();
    }).observe(document.body,{childList:true});

    watchOverlay();
    setInterval(hideOverlay,150);
  })();
  </script>
  <script src="{{ url_for('static', filename='js/goal-notification-patch.js') }}?v=2.1"></script>
  <script src="{{ url_for('static', filename='js/copa-engine.js') }}?v=1.0"></script>
  <script src="{{ url_for('static', filename='js/primera-rfef-data.js') }}?v=1.1"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      /* Agrupa cada back-btn con el icono de inicio */
      document.querySelectorAll('.back-btn').forEach(function(btn){
        if(btn.closest('.nav-row')) return;
        var row = document.createElement('div');
        row.className = 'nav-row';
        btn.parentNode.insertBefore(row, btn);
        row.appendChild(btn);
        var homeBtn = document.createElement('a');
        homeBtn.href = '/';
        homeBtn.className = 'home-icon-btn';
        homeBtn.setAttribute('aria-label', 'Ir al inicio');
        homeBtn.textContent = '🏠';
        row.appendChild(homeBtn);
      });
      /* Nuclear override: fuerza 80px en TODOS los cards del home */
      var sels = [
        '#s-home .menu-card',
        '#s-home .equipo-card',
        '#s-home .mc-athletic',
        '#s-home .mc-betis',
        '#s-home .mc-sociedad',
        '#s-home .mc-madrid',
        '#s-home .mc-barca'
      ];
      var props = ['height','min-height','max-height'];
      sels.forEach(function(s){
        document.querySelectorAll(s).forEach(function(el){
          props.forEach(function(p){ el.style.setProperty(p,'80px','important'); });
          el.style.setProperty('overflow','hidden','important');
          el.style.setProperty('position','relative','important');
          el.style.setProperty('box-sizing','border-box','important');
        });
      });
    });
  </script>
</body>
</html>
