<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>eFootball - Simulador de Poder Real</title>
    <style>
        :root { --main-bg: #0b0e11; --panel: #15191c; --accent: #00ff88; }
        body { background: var(--main-bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        
        .layout { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
        
        /* Cabecera con los Escudos y Poderes */
        .match-header { 
            background: var(--panel); padding: 20px; display: flex; 
            justify-content: center; align-items: center; gap: 50px;
            border-bottom: 2px solid #222;
        }

        .team-box { text-align: center; width: 250px; }
        
        /* El "Escudo" o Círculo de Poder */
        .power-shield {
            width: 80px; height: 80px; border-radius: 50%; 
            border: 4px solid var(--accent); margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900; background: #000;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .team-name { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; }

        /* Marcador */
        .score-section { text-align: center; padding: 40px; }
        .clock { font-size: 1.5rem; color: #ffcc00; font-family: monospace; margin-bottom: 10px; }
        .numbers { font-size: 6rem; font-weight: 900; line-height: 1; }

        /* Acta Estilo Carta */
        .acta-scroll {
            max-width: 600px; margin: 0 auto; height: 300px; 
            overflow-y: auto; background: #000; border: 1px solid #333;
            border-radius: 10px; padding: 15px;
        }
        .gol-card { 
            padding: 15px; margin-bottom: 10px; border-radius: 5px; 
            background: #1a1a1a; display: flex; justify-content: space-between;
            border-left: 5px solid var(--accent);
        }

        .btn-play {
            padding: 15px 40px; background: var(--accent); color: #000;
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
            display: block; margin: 20px auto;
        }
    </style>
</head>
<body>

<div class="layout">
    <div class="match-header">
        <div class="team-box">
            <div id="shield-L" class="power-shield">--</div>
            <select id="select-local" onchange="actualizarEscudos()"></select>
            <div id="display-name-L" class="team-name">Local</div>
        </div>

        <div style="font-size: 2rem; font-weight: 900; color: #333;">VS</div>

        <div class="team-box">
            <div id="shield-V" class="power-shield">--</div>
            <select id="select-visitante" onchange="actualizarEscudos()"></select>
            <div id="display-name-V" class="team-name">Visitante</div>
        </div>
    </div>

    <div class="score-section">
        <div id="ml-timer-j1m1" class="clock">00:00</div>
        <div class="numbers">
            <span id="goles-L">0</span>:<span id="goles-V">0</span>
        </div>
        
        <button class="btn-play" onclick="arrancarMotor()">SIMULAR PARTIDO</button>

        <div class="acta-scroll" id="ml-acta-list-j1m1">
            </div>
    </div>
</div>

<script src="static/js/data-teams.js"></script>
<script src="static/js/jugadores-data.js"></script>
<script src="static/js/index.bundle.js"></script>
<script src="static/js/match-engine.js"></script>

<script>
    // TU BASE DE DATOS REAL (LA QUE MANDA)
    const BASE_PODER = {
        "FC Barcelona": { media: 85, color: "#004d98" },
        "Real Madrid": { media: 85, color: "#ffffff" },
        "Atletico Madrid": { media: 83, color: "#cb3524" },
        "Athletic Club": { media: 79, color: "#ff0000" },
        "Villarreal": { media: 80, color: "#ffe200" },
        "Betis": { media: 79, color: "#0bb363" },
        "Osasuna": { media: 77, color: "#9e0b1c" },
        "Real Sociedad": { media: 79, color: "#0067b1" },
        "Girona": { media: 77, color: "#e2001a" },
        "Rayo Vallecano": { media: 77, color: "#ffffff" },
        "Espanyol": { media: 76, color: "#0088ce" },
        "Celta": { media: 76, color: "#87adcf" },
        "Mallorca": { media: 76, color: "#e30613" },
        "Valencia": { media: 76, color: "#ffffff" },
        "Sevilla": { media: 75, color: "#ffffff" },
        "Getafe": { media: 75, color: "#00539b" },
        "Deportivo Alavés": { media: 74, color: "#005ca9" },
        "Elche": { media: 74, color: "#ffffff" },
        "Real Oviedo": { media: 73, color: "#004a99" },
        "Levante": { media: 72, color: "#004d98" }
    };

    function inicializar() {
        const selL = document.getElementById('select-local');
        const selV = document.getElementById('select-visitante');
        
        Object.keys(BASE_PODER).forEach(nombre => {
            // Creamos la opción solo con el nombre limpio
            selL.add(new Option(nombre, nombre));
            selV.add(new Option(nombre, nombre));
        });

        selV.selectedIndex = 1;
        actualizarEscudos();
    }

    function actualizarEscudos() {
        const loc = document.getElementById('select-local').value;
        const vis = document.getElementById('select-visitante').value;

        // Forzamos el poder de TU lista al escudo
        document.getElementById('shield-L').innerText = BASE_PODER[loc].media;
        document.getElementById('shield-V').innerText = BASE_PODER[vis].media;
        
        // Ponemos el nombre limpio debajo
        document.getElementById('display-name-L').innerText = loc;
        document.getElementById('display-name-V').innerText = vis;

        // Color del escudo
        document.getElementById('shield-L').style.borderColor = BASE_PODER[loc].color;
        document.getElementById('shield-V').style.borderColor = BASE_PODER[vis].color;
    }

    let partidoLoop = null;

    function arrancarMotor() {
        if(partidoLoop) clearInterval(partidoLoop);
        
        const loc = document.getElementById('select-local').value;
        const vis = document.getElementById('select-visitante').value;

        // Creamos motor con las medias de BASE_PODER
        const engine = new MatchEngine(loc, vis, BASE_PODER[loc].media, BASE_PODER[vis].media);

        document.getElementById('ml-acta-list-j1m1').innerHTML = '';

        partidoLoop = setInterval(() => {
            const evento = engine.simularMinuto();
            
            // Reloj
            document.getElementById('ml-timer-j1m1').innerText = (engine.minuto < 10 ? '0' : '') + engine.minuto + ":00";

            if(evento) {
                document.getElementById('goles-L').innerText = engine.golesL;
                document.getElementById('goles-V').innerText = engine.golesV;
                
                const acta = document.getElementById('ml-acta-list-j1m1');
                const card = document.createElement('div');
                card.className = 'gol-card';
                card.innerHTML = `<span><b>${evento.jugador}</b></span> <span>${evento.minuto}' ⚽</span>`;
                acta.prepend(card);
            }

            if(engine.terminado) clearInterval(partidoLoop);
        }, 100);
    }

    inicializar();
</script>

</body>
</html>
