<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga eFootball | Motor de Barajas de Poder</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --gold: #ffcc00;
            --red-power: #ff3333;
            --blue-power: #00ccff;
            --purple-power: #cc33ff;
            --text-main: #e0e0e0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 90%;
            max-width: 800px;
            background: var(--card-bg);
            border: 2px solid #333;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* --- CABECERA Y SELECTORES --- */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--gold);
            margin: 0 0 20px 0;
        }

        .setup-area {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #222;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        select {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 10px;
            border-radius: 5px;
            width: 40%;
            font-size: 1rem;
        }

        /* --- MARCADOR Y TIEMPO --- */
        .match-display {
            text-align: center;
            margin-bottom: 30px;
        }

        #ml-timer-j1m1 {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            font-weight: 900;
            gap: 20px;
            background: linear-gradient(180deg, #222 0%, #000 100%);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #444;
        }

        /* --- BOTÓN KICK OFF --- */
        .controls {
            text-align: center;
            margin-bottom: 30px;
        }

        .btn-kickoff {
            background: linear-gradient(45deg, var(--red-power), #800000);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(255, 51, 51, 0.4);
        }

        .btn-kickoff:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 51, 51, 0.6);
        }

        /* --- ACTA DE GOLES (CARTAS) --- */
        .acta-container {
            background: #000;
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid #333;
        }

        .evento-card {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            background: #111;
            border-left: 5px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilos por Carta de Posición */
        .card-POR { border-left-color: var(--gold); color: var(--gold); }
        .card-DEF { border-left-color: var(--blue-power); color: var(--blue-power); }
        .card-MED { border-left-color: var(--purple-power); color: var(--purple-power); }
        .card-DEL { border-left-color: var(--red-power); color: var(--red-power); }

        .evento-info b { font-size: 1.2rem; display: block; color: #fff; }
        .evento-min { font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h1>LIGA eFOOTBALL</h1>
            <p>Motor Basado en Barajas de Poder</p>
        </header>

        <div class="setup-area">
            <select id="select-local">
                <option value="Real Madrid">Real Madrid</option>
                <option value="FC Barcelona">FC Barcelona</option>
                <option value="Atlético Madrid">Atlético Madrid</option>
                <option value="Athletic Club">Athletic Club</option>
                <option value="Villarreal CF">Villarreal CF</option>
            </select>
            <span style="font-weight: bold; font-size: 1.2rem;">VS</span>
            <select id="select-visitante">
                <option value="FC Barcelona">FC Barcelona</option>
                <option value="Real Madrid">Real Madrid</option>
                <option value="Sevilla FC">Sevilla FC</option>
                <option value="Real Sociedad">Real Sociedad</option>
            </select>
        </div>

        <div class="match-display">
            <div id="ml-timer-j1m1">0'</div>
            <div class="scoreboard">
                <span id="goles-L">0</span>
                <span style="color: #444;">:</span>
                <span id="goles-V">0</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn-kickoff" onclick="iniciarSimulacion()">🔥 Kick Off</button>
        </div>

        <div class="acta-container" id="ml-acta-list-j1m1">
            <p style="text-align: center; color: #555; margin-top: 100px;">Esperando pitido inicial...</p>
        </div>
    </div>

    <script src="static/js/data-teams.js"></script>
    <script src="static/js/jugadores-data.js"></script>
    <script src="static/js/index.bundle.js"></script>
    <script src="static/js/match-engine.js"></script>

    <script>
        let bucle = null;

        function iniciarSimulacion() {
            // 1. Limpieza de interfaz
            if (bucle) clearInterval(bucle);
            document.getElementById('ml-acta-list-j1m1').innerHTML = '';
            document.getElementById('goles-L').innerText = '0';
            document.getElementById('goles-V').innerText = '0';

            // 2. Obtener datos de los selects
            const local = document.getElementById('select-local').value;
            const visitante = document.getElementById('select-visitante').value;

            // 3. Validar que tenemos las medias en data-teams.js
            const configL = window.CONFIG_EQUIPOS[local] || { media: 80 };
            const configV = window.CONFIG_EQUIPOS[visitante] || { media: 80 };

            // 4. Instanciar el motor (MatchEngine)
            const partido = new MatchEngine(local, visitante, configL.media, configV.media);

            // 5. Bucle de ejecución (Reloj)
            bucle = setInterval(() => {
                const evento = partido.simularMinuto();

                // Actualizar Reloj
                document.getElementById('ml-timer-j1m1').innerText = partido.minuto + "'";

                // Si ocurre un GOL
                if (evento && evento.tipo === 'gol') {
                    actualizarMarcador(partido);
                    pintarCartaEvento(evento, partido);
                }

                // Fin del partido
                if (partido.terminado) {
                    clearInterval(bucle);
                    finalizarPartido(partido);
                }
            }, 100); // 100ms = 1 minuto de juego
        }

        function actualizarMarcador(partido) {
            document.getElementById('goles-L').innerText = partido.golesL;
            document.getElementById('goles-V').innerText = partido.golesV;
        }

        function pintarCartaEvento(e, partido) {
            const acta = document.getElementById('ml-acta-list-j1m1');
            
            // Intentamos detectar la posición para asignar la clase de la carta
            // (Esta información viene de la lógica del motor)
            let clasePosicion = "card-DEL"; 
            // Si el motor nos devuelve un jugador de índice bajo, podría ser DEF o MED
            // Aquí lo simplificamos o lo extraemos si el motor lo enviara
            
            const div = document.createElement('div');
            div.className = `evento-card ${clasePosicion}`;
            
            div.innerHTML = `
                <div class="evento-info">
                    <small>${e.equipo.toUpperCase()}</small>
                    <b>⚽ ${e.jugador}</b>
                </div>
                <div class="evento-min">${e.minuto}'</div>
            `;
            
            acta.prepend(div);
        }

        function finalizarPartido(partido) {
            const mvp = partido.calcularMVP();
            const acta = document.getElementById('ml-acta-list-j1m1');
            const finalDiv = document.createElement('div');
            finalDiv.style.textAlign = "center";
            finalDiv.style.padding = "20px";
            finalDiv.innerHTML = `<h3 style="color: var(--gold)">FIN DEL PARTIDO</h3>
                                  <p>MVP: 🌟 ${mvp}</p>`;
            acta.prepend(finalDiv);
        }
    </script>
</body>
</html>
