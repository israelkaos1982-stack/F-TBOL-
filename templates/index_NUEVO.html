<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Barajas de Poder | Liga eFootball</title>
    <style>
        :root { --bg: #0b0e11; --panel: #1a1d21; --accent: #00ff88; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Contenedor Principal */
        .game-container { width: 95%; max-width: 800px; margin-top: 30px; background: var(--panel); border-radius: 20px; padding: 25px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }

        /* Sección de Escudos y Selección */
        .match-setup { display: flex; justify-content: space-around; align-items: center; margin-bottom: 30px; }
        .team-unit { text-align: center; width: 40%; }
        
        /* EL ESCUDO (Donde va el poder) */
        .power-circle {
            width: 85px; height: 85px; border-radius: 50%; border: 4px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 900; background: #000; margin: 0 auto 15px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        select { width: 100%; padding: 10px; background: #2a2e35; color: white; border: 1px solid #444; border-radius: 8px; font-size: 1rem; cursor: pointer; }

        /* Marcador y Tiempo */
        .scoreboard-area { text-align: center; margin: 20px 0; }
        #ml-timer-j1m1 { font-family: monospace; font-size: 1.8rem; color: #ffcc00; margin-bottom: 5px; }
        .big-score { font-size: 5rem; font-weight: 900; letter-spacing: 10px; }

        /* Botón Kick Off */
        .kick-off-btn { 
            width: 100%; padding: 18px; background: var(--accent); color: #000; 
            border: none; border-radius: 10px; font-size: 1.3rem; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; transition: 0.3s; margin: 20px 0;
        }
        .kick-off-btn:hover { background: #00cc6e; transform: scale(1.02); }

        /* Acta de Goles */
        .match-log { background: #000; height: 250px; overflow-y: auto; border-radius: 12px; padding: 15px; border: 1px solid #222; text-align: left; }
        .goal-entry { padding: 10px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="match-setup">
            <div class="team-unit">
                <div id="escudo-local" class="power-circle">--</div>
                <select id="select-local" onchange="sincronizarInterfaz()"></select>
            </div>

            <div style="font-size: 1.5rem; font-weight: bold; color: #444;">VS</div>

            <div class="team-unit">
                <div id="escudo-visitante" class="power-circle">--</div>
                <select id="select-visitante" onchange="sincronizarInterfaz()"></select>
            </div>
        </div>

        <div class="scoreboard-area">
            <div id="ml-timer-j1m1">00:00</div>
            <div class="big-score">
                <span id="goles-L">0</span>:<span id="goles-V">0</span>
            </div>
        </div>

        <button class="kick-off-btn" onclick="iniciarPartido()">🎮 INICIAR SIMULACIÓN</button>

        <div class="match-log">
            <h4 style="margin: 0 0 10px 0; color: #555; font-size: 0.8rem; text-transform: uppercase;">Acta de Goles</h4>
            <div id="ml-acta-list-j1m1"></div>
        </div>
    </div>

    <script src="static/js/data-teams.js"></script>
    <script src="static/js/jugadores-data.js"></script>
    <script src="static/js/index.bundle.js"></script>
    <script src="static/js/match-engine.js"></script>

    <script>
        // ESTA ES TU BASE DE DATOS DE 20 EQUIPOS (Aquí es donde se edita el poder)
        const REGLAMENTO_EQUIPOS = {
            "FC Barcelona": { media: 85, color: "#004d98" },
            "Real Madrid": { media: 85, color: "#ffffff" },
            "Atletico Madrid": { media: 83, color: "#cb3524" },
            "Athletic Club": { media: 79, color: "#ff0000" },
            "Villarreal": { media: 80, color: "#ffe200" },
            "Betis": { media: 79, color: "#0bb363" },
            "Osasuna": { media: 77, color: "#9e0b1c" },
            "Real Sociedad": { media: 79, color: "#0067b1" },
            "Girona": { media: 77, color: "#e2001a" },
            "Rayo Vallecano": { media: 77, color: "#ffffff" },
            "Espanyol": { media: 76, color: "#0088ce" },
            "Celta": { media: 76, color: "#87adcf" },
            "Mallorca": { media: 76, color: "#e30613" },
            "Valencia": { media: 76, color: "#ffffff" },
            "Sevilla": { media: 75, color: "#ffffff" },
            "Getafe": { media: 75, color: "#00539b" },
            "Deportivo Alavés": { media: 74, color: "#005ca9" },
            "Elche": { media: 74, color: "#ffffff" },
            "Real Oviedo": { media: 73, color: "#004a99" },
            "Levante": { media: 72, color: "#004d98" }
        };

        function cargarEquipos() {
            const selL = document.getElementById('select-local');
            const selV = document.getElementById('select-visitante');
            
            Object.keys(REGLAMENTO_EQUIPOS).forEach(nombre => {
                selL.add(new Option(nombre, nombre));
                selV.add(new Option(nombre, nombre));
            });

            selV.selectedIndex = 1;
            sincronizarInterfaz();
        }

        // FUNCIÓN CLAVE: Esta es la que mete el valor en el escudo
        function sincronizarInterfaz() {
            const loc = document.getElementById('select-local').value;
            const vis = document.getElementById('select-visitante').value;

            // Meter el número de media en el círculo (escudo)
            document.getElementById('escudo-local').innerText = REGLAMENTO_EQUIPOS[loc].media;
            document.getElementById('escudo-visitante').innerText = REGLAMENTO_EQUIPOS[vis].media;

            // Cambiar el color del borde para que coincida con el equipo
            document.getElementById('escudo-local').style.borderColor = REGLAMENTO_EQUIPOS[loc].color;
            document.getElementById('escudo-visitante').style.borderColor = REGLAMENTO_EQUIPOS[vis].color;
        }

        let motorBucle = null;

        function iniciarPartido() {
            if(motorBucle) clearInterval(motorBucle);
            
            const l = document.getElementById('select-local').value;
            const v = document.getElementById('select-visitante').value;

            // Creamos el motor usando tus medias del REGLAMENTO
            const motor = new MatchEngine(l, v, REGLAMENTO_EQUIPOS[l].media, REGLAMENTO_EQUIPOS[v].media);

            document.getElementById('ml-acta-list-j1m1').innerHTML = '';
            document.getElementById('goles-L').innerText = '0';
            document.getElementById('goles-V').innerText = '0';

            motorBucle = setInterval(() => {
                const evento = motor.simularMinuto();
                
                // Actualizar Reloj
                document.getElementById('ml-timer-j1m1').innerText = (motor.minuto < 10 ? '0' : '') + motor.minuto + ":00";

                if(evento) {
                    document.getElementById('goles-L').innerText = motor.golesL;
                    document.getElementById('goles-V').innerText = motor.golesV;
                    
                    const acta = document.getElementById('ml-acta-list-j1m1');
                    const div = document.createElement('div');
                    div.className = 'goal-entry';
                    div.innerHTML = `<span><b>${evento.jugador}</b></span> <span>${evento.minuto}' ⚽</span>`;
                    acta.prepend(div);
                }

                if(motor.terminado) clearInterval(motorBucle);
            }, 80);
        }

        // Arrancar al cargar la página
        window.onload = cargarEquipos;
    </script>
</body>
</html>
